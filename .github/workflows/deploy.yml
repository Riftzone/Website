name: CI

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

# Neue Pushes auf denselben Ref brechen laufende Jobs ab.
# Auf main wird NICHT abgebrochen, damit ein laufender Deploy nicht
# mitten im Restart unterbrochen wird.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Code-Style-Check (Pint)
  # ---------------------------------------------------------------------------
  lint:
    name: Pint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: pint
          coverage: none

      - name: Run Pint
        run: pint --test

  # ---------------------------------------------------------------------------
  # 2. PHPUnit + Migrations gegen MySQL
  # ---------------------------------------------------------------------------
  php-tests:
    name: PHP Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: invoice_sphere_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, dom, fileinfo, mysql, bcmath, intl, gd, zip, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --no-scripts

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate
          {
            echo "DB_CONNECTION=mysql"
            echo "DB_HOST=127.0.0.1"
            echo "DB_PORT=3306"
            echo "DB_DATABASE=invoice_sphere_test"
            echo "DB_USERNAME=root"
            echo "DB_PASSWORD=root"
          } >> .env

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent; then
              echo "MySQL is ready."
              exit 0
            fi
            echo "Waiting for MySQL ($i/30)..."
            sleep 2
          done
          echo "MySQL did not become ready in time." >&2
          exit 1

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run PHPUnit
        run: vendor/bin/phpunit --colors=always

  # ---------------------------------------------------------------------------
  # 3. Frontend-Build (Vite)
  # ---------------------------------------------------------------------------
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: public-build
          path: public/build
          retention-days: 7
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 4. Deploy (Pelican Restart) – nur wenn alle obigen Jobs grün sind
  #    UND der Trigger ein Push auf main ist (keine PRs, keine Tags).
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy (Pelican Restart)
    runs-on: ubuntu-latest
    needs: [lint, php-tests, frontend-build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

    # Eigene Concurrency-Gruppe nur für den Deploy-Step:
    # gleichzeitige Deploys werden serialisiert, der ältere abgebrochen.
    concurrency:
      group: deploy-main
      cancel-in-progress: true

    permissions:
      contents: read

    environment:
      name: production
      url: https://panel.golden-developer.de

    steps:
      - name: Trigger restart via Pterodactyl API
        env:
          PELICAN_API_KEY: ${{ secrets.PELICAN_API_KEY }}
          SERVER_ID: ${{ vars.PANEL_SERVER_ID }}
          PANEL_BASE_URL: ${{ vars.PANEL_BASE_URL || 'https://panel.golden-developer.de' }}
        run: |
          set -euo pipefail

          if [[ -z "${PELICAN_API_KEY:-}" ]]; then
            echo "::error::PELICAN_API_KEY secret is missing."
            exit 1
          fi
          if [[ -z "${SERVER_ID:-}" ]]; then
            echo "::error::PANEL_SERVER_ID variable is missing."
            exit 1
          fi

          echo "Restarting server ${SERVER_ID} on ${PANEL_BASE_URL}"

          http_code=$(curl --silent --show-error --output /tmp/pterodactyl.log --write-out "%{http_code}" \
            --request POST "${PANEL_BASE_URL}/api/client/servers/${SERVER_ID}/power" \
            --header "Authorization: Bearer ${PELICAN_API_KEY}" \
            --header "Content-Type: application/json" \
            --header "Accept: application/json" \
            --data '{"signal": "restart"}')

          echo "HTTP ${http_code}"
          cat /tmp/pterodactyl.log || true

          # Pterodactyl Power-Endpoint antwortet bei Erfolg mit 204 No Content.
          if [[ "${http_code}" != "204" && "${http_code}" != "200" ]]; then
            echo "::error::Panel returned HTTP ${http_code}"
            exit 1
          fi

          echo "Restart triggered successfully."
